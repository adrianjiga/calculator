<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A simple, accessible calculator" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="calculator" aria-label="Calculator">
      <h1 class="calculator__title">Calculator</h1>

      <label for="result" class="visually-hidden">Calculator display</label>
      <input
        class="display-box"
        type="text"
        id="result"
        readonly
        aria-live="polite"
        aria-atomic="true"
        placeholder="0"
      />

      <div class="calculator__buttons">
        <!-- Row 1: utility -->
        <button
          type="button"
          class="btn btn--clear"
          id="btn-clear"
          data-action="clear"
          aria-label="Clear"
        >
          C
        </button>
        <button
          type="button"
          class="btn btn--util"
          id="btn-backspace"
          data-action="backspace"
          aria-label="Backspace"
        >
          &#x232B;
        </button>
        <button type="button" class="btn btn--util" data-action="%" aria-label="Percent">%</button>
        <button type="button" class="btn btn--operator" data-action="/" aria-label="Divide">
          &#xF7;
        </button>

        <!-- Row 2 -->
        <button type="button" class="btn" data-action="7">7</button>
        <button type="button" class="btn" data-action="8">8</button>
        <button type="button" class="btn" data-action="9">9</button>
        <button type="button" class="btn btn--operator" data-action="*" aria-label="Multiply">
          &#xD7;
        </button>

        <!-- Row 3 -->
        <button type="button" class="btn" data-action="4">4</button>
        <button type="button" class="btn" data-action="5">5</button>
        <button type="button" class="btn" data-action="6">6</button>
        <button type="button" class="btn btn--operator" data-action="-" aria-label="Subtract">
          &#x2212;
        </button>

        <!-- Row 4 -->
        <button type="button" class="btn" data-action="1">1</button>
        <button type="button" class="btn" data-action="2">2</button>
        <button type="button" class="btn" data-action="3">3</button>
        <button type="button" class="btn btn--operator" data-action="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button type="button" class="btn" data-action=".">.</button>
        <button type="button" class="btn btn--zero" data-action="0">0</button>
        <button
          type="button"
          class="btn btn--equals"
          id="btn-equals"
          data-action="calculate"
          aria-label="Equals"
        >
          =
        </button>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
